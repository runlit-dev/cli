version: 2

project_name: runlit

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: runlit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: runlit
    homepage: "https://runlit.dev"
    description: "AI code eval — catch hallucinated APIs and intent drift in PRs"
    license: "MIT"
    repository:
      owner: runlit-dev
      name: homebrew-tap
    directory: Formula
    install: bin.install "runlit"
    test: |
      system "#{bin}/runlit", "--version"
